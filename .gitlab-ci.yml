# CI/CD Configuration for Gestao Escolar - V2.2 (Consolidated Catalog)
stages:



  - pre-check
  - build
  - quality
  - compliance
  - deploy

include:
  - component: $CI_SERVER_HOST/platform/ci-cd/catalog/cloudflare-pages@main
    inputs:
      node_version: 20
      build_command: npm run build:web
      output_dir: dist
      production_branch: master

  - component: $CI_SERVER_HOST/platform/ci-cd/catalog/sonarqube@main

variables:
  CLOUDFLARE_PROJECT_NAME: "edumanager-app"
  CF_CUSTOM_DOMAIN: "edumanager.facilitalabs.com.br"


